paths:
  /artists:
    get:
      consumes:
      - application/json
      description: Get a list of all artists in the database
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/ArtistResponse'
            type: array
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrResponse'
      summary: List artists
      tags:
      - artists
    post:
      consumes:
      - application/json
      description: Create multiple artists at once from a JSON array
      parameters:
      - description: List of artists to create
        in: body
        name: artists
        required: true
        schema:
          items:
            $ref: '#/definitions/CreateArtistRequest'
          type: array
      produces:
      - application/json
      responses:
        "201":
          description: Created
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/ErrResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrResponse'
      summary: Bulk create artists
      tags:
      - artists
  /artists/{id}:
    get:
      consumes:
      - application/json
      description: Retrieve a single artist by their unique ID
      parameters:
      - description: Artist ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ArtistResponse'
        "400":
          description: Invalid ID format
          schema:
            $ref: '#/definitions/ErrResponse'
        "404":
          description: Artist not found
          schema:
            $ref: '#/definitions/ErrResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrResponse'
      summary: Get a artist
      tags:
      - artists
    put:
      consumes:
      - application/json
      description: Update the details of an existing artist
      parameters:
      - description: Artist ID
        in: path
        name: id
        required: true
        type: integer
      - description: Artist update data
        in: body
        name: artist
        required: true
        schema:
          $ref: '#/definitions/UpdateArtistRequest'
      produces:
