basePath: /
definitions:
  majestic-gondola_internal_models.CreateTrackRequest:
    properties:
      author:
        type: string
      genres:
        items:
          type: string
        type: array
      name:
        type: string
      release_date:
        type: string
    required:
    - author
    - name
    type: object
  majestic-gondola_internal_models.Track:
    properties:
      author:
        type: string
      createdAt:
        type: string
      genres:
        items:
          type: string
        type: array
      id:
        type: integer
      name:
        type: string
      releaseDate:
        type: string
    type: object
  majestic-gondola_internal_models.UpdateTrackRequest:
    properties:
      author:
        type: string
      genres:
        items:
          type: string
        type: array
      id:
        type: integer
      name:
        type: string
      release_date:
        type: string
    required:
    - id
    type: object
externalDocs:
  description: OpenAPI
  url: https://swagger.io/resources/open-api/
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a sample server celler server.
