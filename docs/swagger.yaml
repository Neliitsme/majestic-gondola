basePath: /
definitions:
  CreateTrackRequest:
    properties:
      author:
        example: Queen
        type: string
      genres:
        example:
        - Rock
        - Opera
        items:
          type: string
        type: array
      name:
        example: Bohemian Rhapsody
        type: string
      release_date:
        example: "1975-10-31 15:04:05"
        type: string
    required:
    - author
    - name
    type: object
  ErrorResponse:
    properties:
      message:
        example: error
        type: string
    type: object
  TrackResponse:
    properties:
      author:
        example: Queen
        type: string
      created_at:
        example: "2006-01-02 15:04:05"
        type: string
      genres:
        example:
        - Rock
        - Opera
        items:
          type: string
        type: array
      id:
        example: 1
        type: integer
      name:
        example: Bohemian Rhapsody
        type: string
      release_date:
        example: "1975-10-31 15:04:05"
        type: string
    type: object
  UpdateTrackRequest:
    properties:
      author:
        example: Queen
        type: string
      genres:
        example:
        - Rock
        - Opera
        items:
          type: string
        type: array
      name:
        example: Bohemian Rhapsody
        type: string
      release_date:
        example: "1975-10-31 15:04:05"
        type: string
    required:
    - author
    - name
    type: object
externalDocs:
  description: OpenAPI
  url: https://swagger.io/resources/open-api/
host: localhost:8080
info:
  contact: {}
  description: API docs for the golang project for learning.
  title: Majestic gondola API
  version: "1.0"
paths:
  /track:
    get:
      consumes:
      - application/json
      description: Get a list of all tracks in the database
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/TrackResponse'
            type: array
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: List tracks
      tags:
      - tracks
    post:
      consumes:
      - application/json
      description: Create multiple tracks at once from a JSON array
      parameters:
      - description: List of tracks to create
        in: body
        name: tracks
        required: true
        schema:
          items:
            $ref: '#/definitions/CreateTrackRequest'
          type: array
      produces:
      - application/json
      responses:
        "201":
          description: Created
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Bulk create tracks
      tags:
      - tracks
  /track/{id}:
    get:
      consumes:
      - application/json
      description: Retrieve a single track by its unique ID
      parameters:
      - description: Track ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/TrackResponse'
        "400":
          description: Invalid ID format
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Track not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Get a track
      tags:
      - tracks
    put:
      consumes:
      - application/json
      description: Update the details of an existing track
      parameters:
      - description: Track ID
        in: path
        name: id
        required: true
        type: integer
      - description: Track update data
        in: body
        name: track
        required: true
        schema:
          $ref: '#/definitions/UpdateTrackRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Updated
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Update a track
      tags:
      - tracks
  /track/populate/{count}:
    post:
      consumes:
      - application/json
      description: Generate random tracks for development testing
      parameters:
      - description: Number of tracks to generate
        in: path
        name: count
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "201":
          description: Created
        "400":
          description: Invalid count
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Seed dummy data
      tags:
      - dev
swagger: "2.0"
